# Travel locations
# Add a new entry for each place you've visited.
# lat/lng: coordinates (search "place name coordinates" on Google)
# caption: optional comment shown when clicking the pin
# date: optional date of first visit (e.g. "2019-06" or "2019" or "June 2019")
